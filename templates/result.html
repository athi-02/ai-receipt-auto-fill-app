<!DOCTYPE html>
<html>
<head>
    <title>Receipt Results</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <div class="container py-5">

        <div class="text-center mb-5">
            <span class="badge text-bg-success mb-3">AI Extraction Complete</span>
            <h1 class="fw-bold">Review Extracted Receipt Data</h1>
            <p class="text-muted">
                Verify the extracted information and make edits if necessary before submission.
            </p>
        </div>

        <div class="row g-4 align-items-start">

            <!-- LEFT SIDE -->
            <div class="col-lg-5">

                <div class="card shadow-lg border-0 rounded-4 p-3">
                    <h4 class="fw-bold mb-3">Uploaded Receipt</h4>

                    <img 
                        src="{{ receipt_image }}" 
                        class="img-fluid rounded-4 border"
                    >
                </div>

            </div>

            <!-- RIGHT SIDE -->
            <div class="col-lg-7">

                <div class="card shadow-lg border-0 rounded-4 p-4">

                    <h4 class="fw-bold mb-4">Extracted Information</h4>

                    <form action="/submit" method="POST">

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Merchant Name</label>
                            <input class="form-control form-control-lg" type="text" name="merchant_name" value="{{ merchant_name }}">
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Date</label>
                            <input class="form-control form-control-lg" type="text" name="date" value="{{ date }}">
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Total Amount</label>
                            <input class="form-control form-control-lg" type="text" name="total_amount" value="{{ total_amount }}">
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-semibold">Currency</label>
                            <input class="form-control form-control-lg" type="text" name="currency" value="{{ currency }}">
                        </div>

                        <button type="submit" class="btn btn-success btn-lg w-100">
                            Submit Receipt Data
                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</body>
</html>
