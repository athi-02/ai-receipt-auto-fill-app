<!-- index.html -->
<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Receipt Auto-Fill App</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body class="bg-body-secondary">

    <!-- Dark Mode Button -->
    <button class="btn btn-dark theme-toggle"
            id="themeToggleBtn"
            onclick="toggleTheme()">
        🌙 Dark Mode
    </button>

    <div class="container py-5">

        <div class="card shadow-lg border-0 rounded-5 p-5 mx-auto"
             style="max-width: 900px;">

            <div class="text-center mb-4">

                <span class="badge bg-primary px-3 py-2 mb-3">
                    AI Receipt Extraction
                </span>

                <h1 class="fw-bold display-4">
                    Receipt Auto-Fill App
                </h1>

                <p class="text-secondary fs-4 mt-3">
                    Upload a receipt image and let Gemini AI extract
                    the merchant, date, total amount, and currency.
                </p>

            </div>

            <form action="/upload"
                  method="POST"
                  enctype="multipart/form-data"
                  id="uploadForm">

                <div class="mb-4">

                    <label class="form-label fw-semibold fs-3">
                        Upload Receipt Image
                    </label>

                    <input type="file"
                           name="receipt"
                           class="form-control form-control-lg"
                           accept="image/*"
                           required
                           onchange="previewImage(event)">

                </div>

                <!-- Preview Image -->
                <div class="text-center mb-4">

                    <img id="preview"
                         src=""
                         class="img-fluid rounded shadow d-none"
                         style="max-height: 350px;">

                </div>

                <!-- Spinner -->
                <div class="text-center mb-4 d-none"
                     id="loadingSpinner">

                    <div class="spinner-border text-primary"
                         role="status"
                         style="width: 4rem; height: 4rem;">
                    </div>

                    <p class="mt-3 fw-semibold">
                        AI is extracting receipt information...
                    </p>

                </div>

                <button type="submit"
                        class="btn btn-primary btn-lg w-100 py-3 fw-semibold"
                        onclick="showSpinner()">

                    Extract Receipt Data

                </button>

            </form>

        </div>

    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Theme JS -->
    <script src="{{ url_for('static', filename='js/theme.js') }}"></script>

    <script>

        function previewImage(event) {

            const preview = document.getElementById('preview');

            preview.src = URL.createObjectURL(event.target.files[0]);

            preview.classList.remove('d-none');
        }

        function showSpinner() {

            document.getElementById('loadingSpinner')
                    .classList.remove('d-none');
        }

    </script>

</body>
</html>
