<!DOCTYPE html>
<html>
<head>
    <title>Receipt Auto-Fill App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <div class="container min-vh-100 d-flex align-items-center justify-content-center">
        <div class="card shadow-lg border-0 rounded-4 p-4" style="max-width: 700px; width: 100%;">

            <div class="text-center mb-4">
                <span class="badge text-bg-primary mb-3">AI Receipt Extraction</span>
                <h1 class="fw-bold">Receipt Auto-Fill App</h1>
                <p class="text-muted">
                    Upload a receipt image and let Gemini AI extract the merchant, date, total amount, and currency.
                </p>
            </div>

            <form id="uploadForm" action="/upload" method="POST" enctype="multipart/form-data">

                <div class="mb-3">
                    <label class="form-label fw-semibold">Upload Receipt Image</label>
                    <input id="receiptInput" class="form-control" type="file" name="receipt" accept="image/*" required>
                </div>

                <div id="previewBox" class="text-center mb-4 d-none">
                    <p class="fw-semibold mb-2">Receipt Preview</p>
                    <img id="receiptPreview" class="img-fluid rounded-4 border shadow-sm" style="max-height: 320px;">
                </div>

                <button id="submitBtn" type="submit" class="btn btn-primary w-100 py-2">
                    Extract Receipt Data
                </button>

                <div id="loadingBox" class="text-center mt-4 d-none">
                    <div class="spinner-border text-primary mb-3" role="status"></div>
                    <p class="fw-semibold mb-1">AI is extracting receipt data...</p>
                    <p class="text-muted small">Please wait while the receipt image is being analyzed.</p>
                </div>

            </form>

        </div>
    </div>

    <script>
        const receiptInput = document.getElementById("receiptInput");
        const receiptPreview = document.getElementById("receiptPreview");
        const previewBox = document.getElementById("previewBox");
        const uploadForm = document.getElementById("uploadForm");
        const submitBtn = document.getElementById("submitBtn");
        const loadingBox = document.getElementById("loadingBox");

        receiptInput.addEventListener("change", function () {
            const file = this.files[0];

            if (file) {
                const imageUrl = URL.createObjectURL(file);
                receiptPreview.src = imageUrl;
                previewBox.classList.remove("d-none");
            }
        });

        uploadForm.addEventListener("submit", function () {
            submitBtn.disabled = true;
            submitBtn.innerText = "Processing...";
            loadingBox.classList.remove("d-none");
        });
    </script>

</body>
</html>
