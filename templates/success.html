<!DOCTYPE html>
<html>
<head>
    <title>Receipt Submitted</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body class="bg-body-secondary">

    <button class="btn btn-dark theme-toggle" id="themeToggleBtn" onclick="toggleTheme()">
        🌙 Dark Mode
    </button>

    <div class="container min-vh-100 d-flex align-items-center justify-content-center">
        <div class="card shadow-lg border-0 rounded-4 p-4" style="max-width: 650px; width: 100%;">

            <div class="text-center mb-4">
                <div class="display-3 mb-3">✅</div>
                <h1 class="fw-bold">Receipt Submitted Successfully</h1>
                <p class="text-secondary">Here is the final reviewed receipt information.</p>
            </div>

            <div class="list-group mb-4">
                <div class="list-group-item">
                    <strong>Merchant:</strong> {{ merchant_name }}
                </div>
                <div class="list-group-item">
                    <strong>Date:</strong> {{ date }}
                </div>
                <div class="list-group-item">
                    <strong>Total Amount:</strong> {{ total_amount }}
                </div>
                <div class="list-group-item">
                    <strong>Currency:</strong> {{ currency }}
                </div>
            </div>

            <a href="/" class="btn btn-primary w-100 py-2">
                Upload Another Receipt
            </a>

            <a href="/history" class="btn btn-dark w-100 py-2 mt-3">
                View Receipt History
            </a>

        </div>
    </div>

    <script src="{{ url_for('static', filename='js/theme.js') }}"></script>
</body>
</html>
